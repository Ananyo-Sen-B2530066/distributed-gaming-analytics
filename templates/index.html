<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Counter Strike Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0c0f;
      color: #c8d0d8;
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: clamp(1.25rem, 4vw, 3rem) clamp(1rem, 5vw, 2.5rem);
    }

    /* Fluid container — no fixed max-width lock */
    .container { width: 100%; max-width: 960px; }

    /* ── Header ── */
    .header {
      display: flex; align-items: center;
      gap: clamp(10px, 2vw, 18px);
      margin-bottom: clamp(1.5rem, 4vw, 2.5rem);
      border-bottom: 1px solid #1e2a38;
      padding-bottom: clamp(1rem, 2.5vw, 1.5rem);
    }
    .logo-hex {
      width: clamp(36px, 5vw, 52px); height: clamp(36px, 5vw, 52px);
      background: #e8a020;
      clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .logo-hex svg { width: 55%; height: 55%; }
    .header-title {
      font-size: clamp(18px, 3vw, 28px);
      font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #e8e8e8;
    }
    .header-sub {
      font-size: clamp(9px, 1.2vw, 12px);
      color: #e8a020; letter-spacing: 3px; text-transform: uppercase;
      font-family: 'Share Tech Mono', monospace; margin-top: 3px;
    }

    /* ── Section label ── */
    .section-label {
      font-size: clamp(9px, 1.1vw, 11px);
      letter-spacing: 3px; text-transform: uppercase;
      color: #e8a020; font-family: 'Share Tech Mono', monospace;
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: #1e2a38; }

    /* ── Two-panel layout: sidebar (mode) + main (form) ── */
    .page-body {
      display: grid;
      grid-template-columns: 1fr;          /* mobile: stacked */
      gap: clamp(1rem, 3vw, 2rem);
    }
    @media (min-width: 680px) {
      .page-body {
        grid-template-columns: minmax(190px, 260px) 1fr;  /* desktop: sidebar | form */
        align-items: start;
      }
      .sidebar { position: sticky; top: 1.5rem; }
    }

    /* ── Mode selector ── */
    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;    /* mobile: side by side */
      gap: 10px; margin-bottom: 0;
    }
    @media (min-width: 680px) {
      .mode-grid { grid-template-columns: 1fr; } /* desktop: stacked in sidebar */
    }
    .mode-card {
      background: #0e1318; border: 1px solid #1e2a38;
      border-radius: 2px; padding: clamp(12px, 2vw, 18px);
      cursor: pointer; transition: border-color 0.15s;
      position: relative; overflow: hidden; user-select: none;
    }
    .mode-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: transparent; transition: background 0.15s;
    }
    .mode-card.active { border-color: #e8a020; }
    .mode-card.active::before { background: #e8a020; }
    .mode-card-title {
      font-size: clamp(13px, 1.8vw, 16px);
      font-weight: 700; letter-spacing: 1px; color: #e8e8e8;
      text-transform: uppercase; margin-bottom: 4px;
    }
    .mode-card-desc {
      font-size: clamp(10px, 1.2vw, 12px);
      color: #7a8a9a; font-family: 'Share Tech Mono', monospace;
    }
    .mode-tag {
      font-size: 9px; padding: 2px 6px; border-radius: 2px;
      margin-top: 10px; display: inline-block; letter-spacing: 1px;
      font-family: 'Share Tech Mono', monospace;
    }
    .tag-ml   { background: #1a2a1a; color: #4caf50; border: 1px solid #2a4a2a; }
    .tag-stat { background: #1a1a2a; color: #5c8af5; border: 1px solid #2a2a4a; }

    /* ── Form panel ── */
    .form-panel { display: flex; flex-direction: column; }

    /* auto-fit: fields flow into as many columns as space allows */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: clamp(8px, 1.5vw, 14px);
      margin-bottom: 1.5rem;
    }
    .form-full { grid-column: 1 / -1; }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label {
      font-size: clamp(9px, 1.1vw, 11px);
      letter-spacing: 2px; text-transform: uppercase;
      color: #7a8a9a; font-family: 'Share Tech Mono', monospace;
      display: flex; align-items: center; gap: 6px;
    }
    .stat-badge {
      font-size: 9px; padding: 1px 5px;
      border: 1px solid #1e2a38; border-radius: 2px;
      color: #5a6a7a; letter-spacing: 1px;
    }
    .field input {
      background: #0e1318; border: 1px solid #1e2a38;
      color: #c8d0d8; font-family: 'Share Tech Mono', monospace;
      font-size: clamp(13px, 1.5vw, 15px);
      padding: clamp(8px, 1.4vw, 12px) 12px;
      border-radius: 2px; outline: none;
      transition: border-color 0.15s; width: 100%;
    }
    .field input:focus { border-color: #e8a020; }
    .field input::placeholder { color: #3a4a5a; }

    /* ── Target selector ── */
    #predict-target-row { margin-bottom: 1.5rem; }
    .target-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      gap: 8px;
    }
    .target-card {
      background: #0e1318; border: 1px solid #1e2a38;
      border-radius: 2px; padding: clamp(8px, 1.4vw, 12px) 4px;
      text-align: center; cursor: pointer;
      font-size: clamp(10px, 1.2vw, 12px);
      font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
      color: #7a8a9a; font-family: 'Share Tech Mono', monospace;
      transition: border-color 0.15s, color 0.15s; position: relative;
    }
    .target-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: transparent; transition: background 0.15s;
    }
    .target-card.active { border-color: #5c8af5; color: #5c8af5; }
    .target-card.active::before { background: #5c8af5; }

    /* ── Submit ── */
    .submit-btn {
      width: 100%; background: #e8a020; border: none;
      color: #0a0c0f; font-family: 'Rajdhani', sans-serif;
      font-size: clamp(13px, 1.8vw, 16px);
      font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
      padding: clamp(12px, 2vw, 16px); cursor: pointer;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 50%, calc(100% - 12px) 100%, 0 100%, 12px 50%);
      transition: background 0.15s;
    }
    .submit-btn:hover { background: #f5b535; }

    /* ── Footer ── */
    .footer-line {
      margin-top: clamp(1.5rem, 3vw, 2.5rem);
      border-top: 1px solid #1e2a38; padding-top: 1rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer-line span {
      font-size: clamp(9px, 1vw, 11px);
      font-family: 'Share Tech Mono', monospace; color: #3a4a5a; letter-spacing: 1px;
    }
    .status-dot {
      display: inline-block; width: 6px; height: 6px;
      background: #4caf50; border-radius: 50%; margin-right: 5px;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo-hex">
      <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="11" cy="11" r="8" stroke="#0a0c0f" stroke-width="1.5"/>
        <line x1="11" y1="3"  x2="11" y2="7"  stroke="#0a0c0f" stroke-width="2" stroke-linecap="round"/>
        <line x1="11" y1="15" x2="11" y2="19" stroke="#0a0c0f" stroke-width="2" stroke-linecap="round"/>
        <line x1="3"  y1="11" x2="7"  y2="11" stroke="#0a0c0f" stroke-width="2" stroke-linecap="round"/>
        <line x1="15" y1="11" x2="19" y2="11" stroke="#0a0c0f" stroke-width="2" stroke-linecap="round"/>
        <circle cx="11" cy="11" r="2" fill="#0a0c0f"/>
      </svg>
    </div>
    <div>
      <div class="header-title">Counter Strike Player Analytics</div>
      <div class="header-sub">Player Performance System</div>
    </div>
  </div>

  <form action="/analyze" method="post">
    <input type="hidden" name="mode" id="mode-input" value="analyze" />

    <div class="page-body">

      <!-- Sidebar: mode selector -->
      <div class="sidebar">
        <div class="section-label">Select Mode</div>
        <div class="mode-grid">
          <div class="mode-card active" onclick="selectMode('analyze', this)">
            <div class="mode-card-title">Analyze</div>
            <div class="mode-card-desc">Dataset comparison</div>
            <div class="mode-tag tag-stat">STATISTICS</div>
          </div>
          <div class="mode-card" onclick="selectMode('predict', this)">
            <div class="mode-card-title">Predict</div>
            <div class="mode-card-desc">Random Forest model</div>
            <div class="mode-tag tag-ml">ML MODEL</div>
          </div>
        </div>
      </div>

      <!-- Main panel: fields + target + submit -->
      <div class="form-panel">
        <div class="section-label">Player Data</div>

        <div class="form-grid">
          <div class="field form-full">
            <label>Player Name</label>
            <input type="text" name="name" placeholder="e.g. s1mple" required />
          </div>
          <div class="field" id="field-kills">
            <label>Kills <span class="stat-badge">K</span></label>
            <input type="number" name="kills" placeholder="0" min="0" required />
          </div>
          <div class="field" id="field-deaths">
            <label>Deaths <span class="stat-badge">D</span></label>
            <input type="number" name="deaths" placeholder="0" min="0" required />
          </div>
          <div class="field" id="field-assists">
            <label>Assists <span class="stat-badge">A</span></label>
            <input type="number" name="assists" placeholder="0" min="0" required />
          </div>
          <div class="field" id="field-adr">
            <label>ADR <span class="stat-badge">dmg/r</span></label>
            <input type="number" name="adr" placeholder="0.0" step="0.1" min="0" required />
          </div>
          <div class="field" id="field-kast">
            <label>KAST <span class="stat-badge">%</span></label>
            <input type="number" name="kast" placeholder="0.0" step="0.1" min="0" max="100" required />
          </div>
          <div class="field" id="field-kddiff">
            <label>KD Diff <span class="stat-badge">+/-</span></label>
            <input type="number" name="kddiff" placeholder="0" required />
          </div>
        </div>

        <!-- Prediction target — only in predict mode -->
        <div id="predict-target-row" style="display:none;">
          <div class="section-label">Prediction Target</div>
          <div class="target-grid">
            <div class="target-card active" data-target="kills"   onclick="selectTarget('kills',   this)">Kills</div>
            <div class="target-card"        data-target="assists" onclick="selectTarget('assists', this)">Assists</div>
            <div class="target-card"        data-target="adr"     onclick="selectTarget('adr',     this)">ADR</div>
            <div class="target-card"        data-target="kast"    onclick="selectTarget('kast',    this)">KAST</div>
            <div class="target-card"        data-target="kddiff"  onclick="selectTarget('kddiff',  this)">KD Diff</div>
          </div>
          <input type="hidden" name="target" id="target-input" value="kills" />
        </div>

        <button type="submit" class="submit-btn">&#9654; Run Analysis</button>
      </div>

    </div>
  </form>

  <div class="footer-line">
    <span><span class="status-dot"></span>System Online</span>
    <span>Player Analytics v1.0</span>
  </div>

</div>

<script>
  const TARGET_FIELDS = {
    kills: 'field-kills', assists: 'field-assists',
    adr: 'field-adr', kast: 'field-kast', kddiff: 'field-kddiff',
  };
  let currentTarget = 'kills';

  function selectMode(val, el) {
    document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('mode-input').value = val;
    const isPredictMode = val === 'predict';
    document.getElementById('predict-target-row').style.display = isPredictMode ? 'block' : 'none';
    if (isPredictMode) {
      applyTargetHiding(currentTarget);
    } else {
      Object.values(TARGET_FIELDS).forEach(id => {
        const f = document.getElementById(id);
        if (f) { f.style.display = ''; f.querySelector('input').required = true; }
      });
    }
  }

  function selectTarget(val, el) {
    const prev = document.getElementById(TARGET_FIELDS[currentTarget]);
    if (prev) { prev.style.display = ''; prev.querySelector('input').required = true; }
    document.querySelectorAll('.target-card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('target-input').value = val;
    currentTarget = val;
    applyTargetHiding(val);
  }

  function applyTargetHiding(target) {
    const field = document.getElementById(TARGET_FIELDS[target]);
    if (field) { field.style.display = 'none'; field.querySelector('input').required = false; }
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('predict-target-row').style.display = 'none';
  });
</script>
</body>
</html>
